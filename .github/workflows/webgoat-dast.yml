name: WebGoat DAST via Bridge Teleport

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  webgoat-dast:
    runs-on: self-hosted
    timeout-minutes: 20

    env:
      POLARIS_SERVER_URL: https://poc.polaris.blackduck.com
      POLARIS_ACCESS_TOKEN: ${{ secrets.POLARIS_ACCESS_TOKEN }}
      POLARIS_APPLICATION_NAME: shivam_dast_tunnel
      POLARIS_PROJECT_NAME: webgoat
      WEBGOAT_URL: http://127.0.0.1:8080/WebGoat/login
      BRIDGE_CLI: /Users/sbhardwaj/Downloads/bridge-cli-bundle-4.2-2.1-macos_arm/bridge-cli
      KEEPALIVE: 600

    steps:
      - uses: actions/checkout@v4

      - name: Start WebGoat and Bridge tunnel
        shell: bash
        run: |
          set -e

          cleanup() {
            [ -n "$TUNNEL_PID" ] && kill "$TUNNEL_PID" 2>/dev/null || true
            docker rm -f webgoat-dast-demo 2>/dev/null || true
          }
          trap cleanup EXIT

          docker rm -f webgoat-dast-demo 2>/dev/null || true
          lsof -ti tcp:8080 | xargs kill -9 2>/dev/null || true

          docker run -d --name webgoat-dast-demo \
            -p 127.0.0.1:8080:8080 \
            -p 127.0.0.1:9090:9090 \
            webgoat/webgoat

          for i in {1..60}; do
            if curl -sSf "$WEBGOAT_URL" >/dev/null; then
              echo "WebGoat is reachable"
              break
            fi
            echo "Waiting for WebGoat..."
            sleep 5
          done

          chmod +x "$BRIDGE_CLI"

          "$BRIDGE_CLI" --stage polaris-secure-tunnel \
            polaris.serverUrl="$POLARIS_SERVER_URL" \
            polaris.application.name="$POLARIS_APPLICATION_NAME" \
            polaris.project.name="$POLARIS_PROJECT_NAME" \
            polaris.accessToken="$POLARIS_ACCESS_TOKEN" \
            --diagnostics > bridge-tunnel.log 2>&1 &

          TUNNEL_PID=$!
          echo "Bridge tunnel process started with PID: $TUNNEL_PID"

          sleep 35

          if ! ps -p "$TUNNEL_PID" >/dev/null; then
            echo "Bridge tunnel failed. Last logs:"
            tail -80 bridge-tunnel.log || true
            exit 1
          fi

          echo "Bridge tunnel is running."
          echo "Last Bridge logs:"
          tail -40 bridge-tunnel.log || true

          echo "Now trigger Polaris DAST scan if using manual UI trigger."
          echo "Keeping tunnel alive for $KEEPALIVE seconds..."
          sleep "$KEEPALIVE"

          echo "Keepalive finished. Cleaning up."
