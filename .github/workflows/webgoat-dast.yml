name: WebGoat DAST Scan via Bridge CLI + Teleport

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: webgoat-dast-${{ github.ref }}
  cancel-in-progress: false

jobs:
  webgoat-dast:
    name: Run WebGoat and trigger Polaris DAST
    runs-on: self-hosted
    timeout-minutes: 75

    env:
      BRIDGE_POLARIS_ACCESSTOKEN: ${{ secrets.POLARIS_ACCESS_TOKEN }}
      WEBGOAT_URL: http://127.0.0.1:8080/WebGoat/login
      TUNNEL_KEEPALIVE_SECONDS: 3600

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start WebGoat
        shell: bash
        run: |
          echo "Starting WebGoat for DAST demo..."
          ./scripts/start-webgoat.sh

      - name: Verify WebGoat is running
        shell: bash
        run: |
          echo "Checking WebGoat endpoint: ${WEBGOAT_URL}"

          for i in $(seq 1 60); do
            if curl -fsS "${WEBGOAT_URL}" > /dev/null 2>&1; then
              echo "✅ WebGoat is reachable!"
              exit 0
            fi

            echo "⏳ Waiting for WebGoat... attempt $i/60"
            sleep 5
          done

          echo "❌ WebGoat is not reachable."
          echo "Container logs:"
          docker logs webgoat || true
          exit 1

      - name: Verify Bridge CLI
        shell: bash
        run: |
          bridge-cli --version

      - name: Start Polaris Secure Tunnel in background
        shell: bash
        run: |
          echo "Starting Polaris Secure Tunnel in background..."

          bridge-cli --stage polaris-secure-tunnel \
            polaris.serverUrl="${{ secrets.POLARIS_SERVER_URL }}" \
            polaris.application.name="${{ secrets.POLARIS_APP_NAME }}" \
            polaris.project.name="${{ secrets.POLARIS_PROJECT_NAME }}" \
            > secure-tunnel.log 2>&1 &

          echo $! > secure-tunnel.pid

          echo "Secure Tunnel PID:"
          cat secure-tunnel.pid

          echo "Giving Secure Tunnel time to initialise..."
          sleep 30

          echo "Secure Tunnel startup log:"
          cat secure-tunnel.log || true

      - name: Trigger Polaris DAST scan
        shell: bash
        run: |
          set +e

          echo "Triggering Polaris DAST scan for WebGoat..."

          bridge-cli --stage polaris \
            polaris.serverUrl="${{ secrets.POLARIS_SERVER_URL }}" \
            polaris.assessment.types="DAST" \
            polaris.application.name="${{ secrets.POLARIS_APP_NAME }}" \
            polaris.project.name="${{ secrets.POLARIS_PROJECT_NAME }}" \
            polaris.waitForScan=false 2>&1 | tee bridge-output.log

          BRIDGE_EXIT_CODE=${PIPESTATUS[0]}

          echo "Bridge CLI exit code: ${BRIDGE_EXIT_CODE}"

          if grep -q "Successfully created test" bridge-output.log; then
            echo "✅ Polaris DAST scan was successfully triggered."
            exit 0
          fi

          echo "❌ Polaris DAST scan was not confirmed as created."
          echo "Bridge CLI output did not contain: Successfully created test"
          exit ${BRIDGE_EXIT_CODE}

      - name: Keep Secure Tunnel alive while scan runs
        shell: bash
        run: |
          echo "Keeping Secure Tunnel alive for Polaris DAST scan..."
          echo "Tunnel keepalive seconds: ${TUNNEL_KEEPALIVE_SECONDS}"
          sleep "${TUNNEL_KEEPALIVE_SECONDS}"

      - name: Stop Secure Tunnel
        if: always()
        shell: bash
        run: |
          echo "Stopping Secure Tunnel if still running..."

          if [ -f secure-tunnel.pid ]; then
            TUNNEL_PID=$(cat secure-tunnel.pid)
            echo "Stopping Secure Tunnel PID: ${TUNNEL_PID}"
            kill "${TUNNEL_PID}" || true
          fi

          echo "Final Secure Tunnel log:"
          cat secure-tunnel.log || true

      - name: Show WebGoat logs
        if: always()
        shell: bash
        run: |
          echo "Final WebGoat logs:"
          docker logs webgoat || true

      - name: Print final message
        shell: bash
        run: |
          echo "✅ GitHub Actions workflow completed."
          echo "👉 Check Polaris UI for DAST scan progress, crawl report, and findings."
