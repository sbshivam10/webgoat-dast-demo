name: WebGoat DAST via Bridge Teleport

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      tunnel_keepalive_seconds:
        description: "Tunnel keepalive seconds"
        required: true
        default: "600"
        type: string

jobs:
  webgoat-dast:
    runs-on: self-hosted
    timeout-minutes: 20

    env:
      POLARIS_SERVER_URL: ${{ secrets.POLARIS_SERVER_URL }}
      POLARIS_ACCESS_TOKEN: ${{ secrets.POLARIS_ACCESS_TOKEN }}
      POLARIS_APPLICATION_NAME: shivam_dast_tunnel
      POLARIS_PROJECT_NAME: webgoat
      WEBGOAT_URL: http://127.0.0.1:8080/WebGoat/login
      TUNNEL_KEEPALIVE_SECONDS: ${{ inputs.tunnel_keepalive_seconds || '600' }}
      BRIDGE_CLI: /Users/sbhardwaj/Desktop/bridge-cli-bundle-4.2-2.1-macos_arm/bridge-cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free port 8080 and cleanup old containers
        shell: bash
        run: |
          docker rm -f webgoat-dast-demo || true
          docker ps -q --filter "publish=8080" | xargs -r docker rm -f || true

          PORT_PID=$(lsof -ti tcp:8080 || true)
          if [ -n "$PORT_PID" ]; then
            echo "Port 8080 is used by PID $PORT_PID. Killing it for demo cleanup."
            kill -9 $PORT_PID || true
          fi

      - name: Start WebGoat
        shell: bash
        run: |
          docker run -d \
            --name webgoat-dast-demo \
            -p 127.0.0.1:8080:8080 \
            -p 127.0.0.1:9090:9090 \
            webgoat/webgoat

      - name: Wait for WebGoat
        shell: bash
        run: |
          for i in {1..60}; do
            if curl -sSf "$WEBGOAT_URL" > /dev/null; then
              echo "WebGoat is reachable"
              exit 0
            fi
            echo "Waiting for WebGoat..."
            sleep 5
          done

          echo "WebGoat did not start"
          docker logs webgoat-dast-demo --tail 100 || true
          exit 1

      - name: Start Polaris Secure Tunnel
        shell: bash
        run: |
          chmod +x "$BRIDGE_CLI"

          "$BRIDGE_CLI" \
            --stage polaris-secure-tunnel \
            polaris.application.name="$POLARIS_APPLICATION_NAME" \
            polaris.project.name="$POLARIS_PROJECT_NAME" \
            polaris.serverUrl="$POLARIS_SERVER_URL" \
            polaris.accessToken="$POLARIS_ACCESS_TOKEN" \
            --diagnostics &

          echo $! > bridge-tunnel.pid
          sleep 30

      - name: Keep tunnel alive for Polaris scan
        shell: bash
        run: |
          echo "Keeping tunnel alive for $TUNNEL_KEEPALIVE_SECONDS seconds"
          sleep "$TUNNEL_KEEPALIVE_SECONDS"
          echo "Tunnel keepalive completed"

      - name: Sleep after scan window
        shell: bash
        run: |
          echo "Sleeping after scan window..."
          sleep 60
          echo "Done"

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          if [ -f bridge-tunnel.pid ]; then
            kill "$(cat bridge-tunnel.pid)" || true
            rm -f bridge-tunnel.pid
          fi

          docker rm -f webgoat-dast-demo || true
